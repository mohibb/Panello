name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    env:
      PORT: 3000
      ADMIN_PASSWORD: ci_test_password
      FAMILY_NAME: TestFamily
      LOCATION_LAT: "59.9139"
      LOCATION_LON: "10.7522"
      DATABASE_PATH: ":memory:"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
